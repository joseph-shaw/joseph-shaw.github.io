<style>
* {
  box-sizing: border-box;
}

body {
  margin:  0% 10% 0% 10%;
  font-family: Arial;
}

.header {
  text-align: center;
  padding: 1.5%;
}

/* Create three equal columns that floats next to each other */
.column {
  float: left;
  width: 33%;
  padding: 1.5%;
}  
  
.column img {
  margin-top: 5px;
 	/* HOVER OFF */
  -webkit-transition: .2s ease-in-out;
}
  
 .column img:hover {

  filter: brightness(70%);
  -webkit-transition: .2s ease-in-out;
	transition: .2s ease-in-out;
} 
  

/* Clear floats after the columns */
.row:after {
  content: "";
  display: table;
  clear: both;
}
</style>
