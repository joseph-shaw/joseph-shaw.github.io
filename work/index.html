<style>
.container {
  position: relative;

.image {

  display: inline;
  width: 100%;
  height: auto;

  backface-visibility: hidden;
}

.middle {
  transition: .5s ease;
  opacity: 0;
  position: absolute;
  top: 100%;
  left: 100%;
  transform: translate(-100%, -100%);
  -ms-transform: translate(-100%, -100%);
  text-align: center;
}

.container:hover .image {
  opacity: 0.3;
}

.container:hover .middle {
  opacity: 1;
}

.text {
  background-color: rgba(0,0,0,0.3);
  color: white;
  font-size: 16px;
  padding: 16px 32px;
}
</style>
